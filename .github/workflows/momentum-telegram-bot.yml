name: momentum-telegram-bot

on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "state/**"
  workflow_dispatch:
    inputs:
      execution_profile:
        description: "Execution profile (keep/1/2/3)"
        required: false
        default: "keep"
        type: choice
        options:
          - keep
          - "1"
          - "2"
          - "3"

permissions:
  contents: write

concurrency:
  group: momentum-telegram-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run momentum bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXECUTION_PROFILE_INPUT: ${{ github.event.inputs.execution_profile || '' }}
        run: |
          EXTRA_ARGS=()
          if [ -n "${EXECUTION_PROFILE_INPUT}" ] && [ "${EXECUTION_PROFILE_INPUT}" != "keep" ]; then
            EXTRA_ARGS+=(--execution-profile "${EXECUTION_PROFILE_INPUT}")
            echo "Applying execution profile: ${EXECUTION_PROFILE_INPUT}"
          fi
          set +e
          RC=1
          for TRY in 1 2 3; do
            echo "Recommendation run attempt ${TRY}/3"
            python momentum_telegram_agent.py \
              --state-file state/bot_state.json \
              --history-file state/eval_history.jsonl \
              "${EXTRA_ARGS[@]}"
            RC=$?
            if [ "${RC}" -eq 0 ]; then
              echo "Recommendation run succeeded."
              break
            fi
            echo "[WARN] recommendation run failed (attempt ${TRY}, rc=${RC})"
            sleep 6
          done
          if [ "${RC}" -ne 0 ]; then
            exit "${RC}"
          fi

      - name: Commit and push state (after recommendation run)
        run: |
          if [ -z "$(git status --porcelain -- state)" ]; then
            echo "No state change after recommendation run."
            exit 0
          fi

          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("state/bot_state.json")
          if not p.exists():
              raise SystemExit("state/bot_state.json missing")
          txt = p.read_text(encoding="utf-8")
          for m in ("<<<<<<<", "=======", ">>>>>>>"):
              if m in txt:
                  raise SystemExit(f"conflict marker detected in state file: {m}")
          json.loads(txt)
          print("State integrity check OK.")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          git commit -m "chore(bot): update momentum state (run) [skip ci]"
          if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
            echo "[WARN] rebase failed after recommendation run; aborting rebase and skipping push to protect state."
            git rebase --abort || true
            exit 0
          fi
          set +e
          PUSH_RC=1
          for TRY in 1 2 3; do
            git push origin HEAD:"${GITHUB_REF_NAME}"
            PUSH_RC=$?
            if [ "${PUSH_RC}" -eq 0 ]; then
              break
            fi
            echo "[WARN] push failed after recommendation run (attempt ${TRY}, rc=${PUSH_RC})"
            sleep 3
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              echo "[WARN] rebase failed during push retry; aborting and skipping push."
              git rebase --abort || true
              exit 0
            fi
          done
          if [ "${PUSH_RC}" -ne 0 ]; then
            echo "[WARN] push still failing after retries; continuing without failing workflow."
            exit 0
          fi

      - name: Run loss watchdog (near real-time)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          RC=1
          for TRY in 1 2 3; do
            echo "Watchdog attempt ${TRY}/3"
            python momentum_telegram_agent.py \
              --state-file state/bot_state.json \
              --history-file state/eval_history.jsonl \
              --alerts-only \
              --watch \
              --interval-sec 15 \
              --cycles 14
            RC=$?
            if [ "${RC}" -eq 0 ]; then
              echo "Watchdog succeeded."
              break
            fi
            echo "[WARN] watchdog failed (attempt ${TRY}, rc=${RC})"
            sleep 5
          done
          if [ "${RC}" -ne 0 ]; then
            echo "[WARN] watchdog failed after retries; recommendation run already completed, so workflow continues."
            exit 0
          fi

      - name: Commit and push state (after watchdog)
        run: |
          if [ -z "$(git status --porcelain -- state)" ]; then
            echo "No state change after watchdog."
            exit 0
          fi

          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("state/bot_state.json")
          if not p.exists():
              raise SystemExit("state/bot_state.json missing")
          txt = p.read_text(encoding="utf-8")
          for m in ("<<<<<<<", "=======", ">>>>>>>"):
              if m in txt:
                  raise SystemExit(f"conflict marker detected in state file: {m}")
          json.loads(txt)
          print("State integrity check OK.")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          git commit -m "chore(bot): update momentum state [skip ci]"
          if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
            echo "[WARN] rebase failed after watchdog; aborting rebase and skipping push to protect state."
            git rebase --abort || true
            exit 0
          fi
          set +e
          PUSH_RC=1
          for TRY in 1 2 3; do
            git push origin HEAD:"${GITHUB_REF_NAME}"
            PUSH_RC=$?
            if [ "${PUSH_RC}" -eq 0 ]; then
              break
            fi
            echo "[WARN] push failed after watchdog (attempt ${TRY}, rc=${PUSH_RC})"
            sleep 3
            if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
              echo "[WARN] rebase failed during push retry; aborting and skipping push."
              git rebase --abort || true
              exit 0
            fi
          done
          if [ "${PUSH_RC}" -ne 0 ]; then
            echo "[WARN] push still failing after retries; continuing without failing workflow."
            exit 0
          fi
